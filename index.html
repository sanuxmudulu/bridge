<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continue</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.35s ease forwards 0.1s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.08);
      }

      50% {
        box-shadow: 0 0 0 10px rgba(0, 0, 0, 0);
      }
    }

    .icon-wrap svg {
      width: 30px;
      height: 30px;
      color: #111;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.8px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #777;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      min-width: 190px;
      padding: 17px 32px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 999px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.18);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .btn:active {
      transform: scale(0.97);
      background: #333;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Ready?</h1>
    <p>Tap below to proceed</p>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="6" x2="12" y2="15"></line>
        <polyline points="8 11 12 15 16 11"></polyline>
      </svg>
    </div>

    <a class="btn" id="cta" href="#">CONTINUE</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ad = params.get("ad");

    const LANDER_BASE = "https://www.perkc.com/";
    const LANDER_URL = ad
      ? `${LANDER_BASE}?ad=${encodeURIComponent(ad)}`
      : LANDER_BASE;

    const cta = document.getElementById("cta");
    cta.href = LANDER_URL;

    cta.addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = LANDER_URL;
    });

    // Optional auto-redirect attempt after page loads
    setTimeout(() => {
      window.location.href = LANDER_URL;
    }, 900);
  </script>

</body>
</html>
