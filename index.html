<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Continue</title>

  <style>
    :root {
      --background: #050a18;
      --surface: #0b1227;
      --text: #f7f9ff;
      --red: #ff3150;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(
          circle at 50% 25%,
          rgba(48, 70, 145, 0.14),
          transparent 38%
        ),
        linear-gradient(180deg, #050a18 0%, #040915 100%);
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .bridge {
      width: min(100%, 420px);
      padding: 42px 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      background: linear-gradient(
        145deg,
        rgba(15, 24, 50, 0.98),
        rgba(10, 17, 37, 0.98)
      );
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-bottom: 28px;
      font-size: clamp(30px, 9vw, 44px);
      line-height: 1.08;
      letter-spacing: -1.5px;
      font-weight: 900;
      text-wrap: balance;
    }

    .continue-button {
      width: min(100%, 280px);
      min-height: 64px;
      padding: 16px 24px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff3655 0%, #f22848 100%);
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 14px 34px rgba(255, 49, 80, 0.28),
        0 0 30px rgba(255, 49, 80, 0.14);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease;
    }

    .continue-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 18px 40px rgba(255, 49, 80, 0.36),
        0 0 34px rgba(255, 49, 80, 0.2);
    }

    .continue-button:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .bridge {
        padding: 38px 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>
  <main class="bridge">
    <h1>Click below to continue</h1>

    <button class="continue-button" type="button">
      Continue
    </button>
  </main>
</body>
</html>
